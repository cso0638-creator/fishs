<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>활어 재고관리 메모장</title>
<style>
  :root {
    --bg: #0b1420;
    --panel: #101d2c;
    --panel2: #16283b;
    --accent: #22d3ee;
    --accent-dim: #0e7490;
    --text: #e6f1f8;
    --text-dim: #7fa3bb;
    --border: #1f3548;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, var(--bg), #081019);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    padding: 16px 10px 60px;
  }
  h1 {
    font-size: 19px;
    text-align: center;
    color: var(--accent);
    margin: 4px 0 2px;
    letter-spacing: 0.5px;
  }
  .sub {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 14px;
  }
  .status {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    height: 16px;
    transition: opacity 0.3s;
  }
  .status.saved { color: var(--accent); }

  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 640px;
  }
  th {
    background: var(--panel2);
    color: var(--accent);
    font-size: 12.5px;
    padding: 10px 6px;
    position: sticky;
    top: 0;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  td {
    border-bottom: 1px solid var(--border);
    padding: 4px;
    text-align: center;
  }
  tr:last-child td { border-bottom: none; }
  td.num {
    color: var(--text-dim);
    font-size: 12px;
    width: 30px;
  }
  input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    padding: 10px 4px;
    text-align: center;
    border-radius: 6px;
  }
  input:focus {
    outline: none;
    background: rgba(34, 211, 238, 0.1);
  }
  input.price, input.stock { text-align: right; padding-right: 8px; }

  td.value {
    color: var(--text-dim);
    font-size: 12.5px;
    white-space: nowrap;
  }
  td.del {
    width: 34px;
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  button.act {
    flex: 1;
    min-width: 100px;
    padding: 12px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 13.5px;
    cursor: pointer;
  }
  button.act.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: white;
  }
  button.act:active { transform: scale(0.97); }

  .summary {
    margin-top: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
  }
  .summary .label { color: var(--text-dim); }
  .summary .val { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<h1>🐟 활어 재고관리 메모장</h1>
<div class="sub">어종 · 사이즈 · 어장주 · 단가 · 재고</div>
<div class="status" id="status">불러오는 중...</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>어종</th>
        <th>사이즈</th>
        <th>어장주</th>
        <th>단가(원)</th>
        <th>재고(kg)</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="actions">
  <button class="act primary" id="addRow">+ 행 추가</button>
  <button class="act" id="exportCsv">CSV 내보내기</button>
  <button class="act" id="resetAll">전체 초기화</button>
</div>

<script>
const KEY = 'fish-inventory-rows';
let rows = [];
let saveTimer = null;

function blankRow(n) {
  return { id: n, species: '', size: '', owner: '', price: '', stock: '' };
}

function fmt(n) {
  if (!n || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

async function load() {
  const statusEl = document.getElementById('status');
  try {
    const res = await window.storage.get(KEY, false);
    rows = res && res.value ? JSON.parse(res.value) : null;
  } catch (e) {
    rows = null;
  }
  if (!rows || rows.length === 0) {
    rows = Array.from({length: 10}, (_, i) => blankRow(i + 1));
  }
  statusEl.textContent = '자동 저장 활성화됨';
  render();
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  rows.forEach((row, idx) => {
    const amount = (parseFloat(row.price) || 0) * (parseFloat(row.stock) || 0);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num">${idx + 1}</td>
      <td><input type="text" value="${escapeHtml(row.species)}" data-field="species" data-idx="${idx}" placeholder="예: 광어"></td>
      <td><input type="text" value="${escapeHtml(row.size)}" data-field="size" data-idx="${idx}" placeholder="예: 대"></td>
      <td><input type="text" value="${escapeHtml(row.owner)}" data-field="owner" data-idx="${idx}" placeholder="어장주"></td>
      <td><input type="number" class="price" value="${row.price}" data-field="price" data-idx="${idx}" placeholder="0" inputmode="numeric"></td>
      <td><input type="number" class="stock" value="${row.stock}" data-field="stock" data-idx="${idx}" placeholder="0" inputmode="numeric"></td>
      <td class="value">${fmt(amount)}원</td>
      <td class="del"><button class="del-btn" data-idx="${idx}">×</button></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', onInput);
  });
  tbody.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', onDelete);
  });
}

function escapeHtml(str) {
  return (str || '').toString().replace(/"/g, '&quot;');
}

function onInput(e) {
  const idx = parseInt(e.target.dataset.idx);
  const field = e.target.dataset.field;
  rows[idx][field] = e.target.value;
  // update amount cell + total live without full re-render (keeps focus)
  const tr = e.target.closest('tr');
  const amount = (parseFloat(rows[idx].price) || 0) * (parseFloat(rows[idx].stock) || 0);
  tr.querySelector('.value').textContent = fmt(amount) + '원';
  scheduleSave();
}

function onDelete(e) {
  const idx = parseInt(e.target.dataset.idx);
  rows.splice(idx, 1);
  render();
  scheduleSave();
}

function scheduleSave() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = '저장 중...';
  statusEl.classList.remove('saved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await window.storage.set(KEY, JSON.stringify(rows), false);
      statusEl.textContent = '✓ 저장됨';
      statusEl.classList.add('saved');
    } catch (e) {
      statusEl.textContent = '저장 실패 (다시 시도해주세요)';
    }
  }, 500);
}

document.getElementById('addRow').addEventListener('click', () => {
  const maxId = rows.length ? Math.max(...rows.map(r => r.id)) : 0;
  rows.push(blankRow(maxId + 1));
  render();
  scheduleSave();
});

document.getElementById('resetAll').addEventListener('click', () => {
  if (confirm('모든 데이터를 초기화할까요? 되돌릴 수 없습니다.')) {
    rows = Array.from({length: 10}, (_, i) => blankRow(i + 1));
    render();
    scheduleSave();
  }
});

document.getElementById('exportCsv').addEventListener('click', () => {
  const header = ['번호', '어종', '사이즈', '어장주', '단가', '재고', '금액'];
  const lines = [header.join(',')];
  rows.forEach((r, idx) => {
    const amount = (parseFloat(r.price) || 0) * (parseFloat(r.stock) || 0);
    lines.push([idx + 1, r.species, r.size, r.owner, r.price, r.stock, amount].join(','));
  });
  const csv = '\uFEFF' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '활어재고_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
});

load();
</script>
</body>
</html>
